                            const matchQ = !q || [b.titulo, b.materia, b.autor].some(f => slug(f).includes(q));
                            const matchC = !abmCareer || bookCareerId(b) === abmCareer;
                            const matchS = abmStatus === 'all' || (abmStatus === 'active' && b.activo !== false) || (abmStatus === 'inactive' && b.activo === false);
                            return matchQ && matchC && matchS;
                          });
                          if (catSortConfig.key) {
                            list = [...list].sort((a, b) => {
                              let aVal, bVal;
                              if (catSortConfig.key === 'libro') { aVal = a.titulo; bVal = b.titulo; }
                              else if (catSortConfig.key === 'carrera') { aVal = a.carrera; bVal = b.carrera; }
                              else if (catSortConfig.key === 'paginas') { aVal = a.paginas; bVal = b.paginas; }
                              else if (catSortConfig.key === 'a4bn') { aVal = a.a4_bn_final; bVal = b.a4_bn_final; }
                              else if (catSortConfig.key === 'a4color') { aVal = a.a4_color_final; bVal = b.a4_color_final; }
                              else if (catSortConfig.key === 'a5bn') { aVal = a.a5_bn_final; bVal = b.a5_bn_final; }
                              else if (catSortConfig.key === 'a5color') { aVal = a.a5_color_final; bVal = b.a5_color_final; }
                              else if (catSortConfig.key === 'estado') { aVal = a.activo !== false ? 1 : 0; bVal = b.activo !== false ? 1 : 0; }
                              else { aVal = a[catSortConfig.key]; bVal = b[catSortConfig.key]; }
                              if (typeof aVal === 'string') { aVal = slug(aVal); bVal = slug(bVal); }
                              if (aVal == null) aVal = ''; if (bVal == null) bVal = '';
                              if (aVal < bVal) return catSortConfig.direction === 'asc' ? -1 : 1;
                              if (aVal > bVal) return catSortConfig.direction === 'asc' ? 1 : -1;
                              return 0;
                            });
                          }
                          return list.map(b => (

                              </td>
                              <td style={!catColumnVisibility.a4color ? { width: '40px', minWidth: '40px', maxWidth: '40px', overflow: 'hidden', padding: '8px' } : {}}>

                      <><Icon.Upload /> Parsear con Gemini</>
                    )}
                  </button>
                </div>
              </div>
              <div className="card p-5">
                <div className="font-700 text-sm text-ink-800 mb-4">Previsualizacion</div>
                {!parserPreview ? (
                  <div className="text-center text-ink-400 py-10">
                    <Icon.Message />
                    <p className="mt-2 text-sm">Parseá un mensaje para ver la previsualización</p>
                  </div>
                ) : (
                  <>
                    <div className="space-y-3 text-sm">
                      <div className="flex justify-between"><span className="text-ink-500">Nombre</span><span className="font-700 text-right ml-4">{parserPreview.nombre}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Telefono</span><span className="font-700">{parserPreview.whatsapp || '-'}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Libros</span><span className="font-700 text-right ml-4">{parserPreview.libros.map(book => book.titulo).join(', ') || 'Sin match'}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Formato</span><span className="font-700">{parserPreview.formato}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Seña / pago</span><span className="font-700">{fmt(parserPreview.montoPagado)}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Saldo</span><span className="font-700">{fmt(parserPreview.saldo)}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Total</span><span className="font-700">{fmt(parserPreview.total)}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Color</span><span className="font-700">{parserPreview.color ? 'Si' : 'No'}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Express</span><span className="font-700">{parserPreview.express ? 'Si' : 'No'}</span></div>
                      {parserPreview.entrega?.fecha && <div className="flex justify-between"><span className="text-ink-500">Fecha entrega</span><span className="font-700">{parserPreview.entrega.fecha}</span></div>}
                    </div>
                    {parserPreview.aiMsjWs && (
                      <div className="mt-4 p-3 bg-ink-50 rounded-lg">
                        <div className="text-xs font-700 text-ink-500 mb-1">Mensaje de WhatsApp generado por IA:</div>
                        <pre className="text-xs text-ink-700 whitespace-pre-wrap font-mono">{parserPreview.aiMsjWs}</pre>
                      </div>
                    )}
                    <div className="mt-5">
                      <button className="btn-primary w-full" disabled={!parserPreview.libros.length || parserImporting} onClick={importParserPreview}>
                        {parserImporting ? (
                          <span className="flex items-center justify-center gap-2"><span className="spinner-sm" /> Generando WA y guardando...</span>
                        ) : 'Guardar pedido previsualizado'}
                      </button>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          {tab === 'config' && (
            <div className="space-y-5">
              <div className="card p-5">
                <div className="font-700 text-sm text-ink-800 mb-4">Control de capacidad y entregas</div>
                <div className="grid gap-4 md:grid-cols-3">
                  <div>
                    <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">Capacidad diaria</label>
                    <input className="input-field" type="number" value={config.produccion.capacidad_diaria_paginas} onChange={event => setConfig(current => ({ ...current, produccion: { ...current.produccion, capacidad_diaria_paginas: Number(event.target.value || 0) } }))} />
                  </div>
                  <div>
                    <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">Precio promedio hoja</label>
                    <input className="input-field" type="number" value={config.produccion.precio_promedio_hoja} onChange={event => setConfig(current => ({ ...current, produccion: { ...current.produccion, precio_promedio_hoja: Number(event.target.value || 0) } }))} />
                  </div>
                  <div>
                    <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">Mínimo cadete</label>
                    <input className="input-field" type="number" value={config.entrega?.cadete_minimo || 100} onChange={event => setConfig(current => ({ ...current, entrega: { ...current.entrega, cadete_minimo: Number(event.target.value || 0) } }))} />
                  </div>
                </div>
              </div>

              <div className="card p-5">
                <div className="font-700 text-sm text-ink-800 mb-4">Precios y redondeo</div>
                <div className="grid gap-4 md:grid-cols-2 xl:grid-cols-5">
                  {[
                    ['A4 menos 50', config.precios.A4.menos_50, value => ({ precios: { ...config.precios, A4: { ...config.precios.A4, menos_50: value } } })],
                    ['A4 mas 50', config.precios.A4.mas_50, value => ({ precios: { ...config.precios, A4: { ...config.precios.A4, mas_50: value } } })],
                    ['A5 fijo', config.precios.A5.unico, value => ({ precios: { ...config.precios, A5: { ...config.precios.A5, unico: value } } })],
                    ['Anillado', config.encuadernacion.basica, value => ({ encuadernacion: { ...config.encuadernacion, basica: value } })],
                    ['Redondeo', config.redondeo.multiplo, value => ({ redondeo: { ...config.redondeo, multiplo: value } })]
                  ].map(([label, value, builder]) => (
                    <div key={label}>
                      <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">{label}</label>
                      <input className="input-field" type="number" value={value} onChange={event => setConfig(current => ({ ...current, ...builder(Number(event.target.value || 0)) }))} />
                    </div>
                  ))}
                </div>
              </div>

              <div className="card p-5">
                <div className="flex items-center justify-between mb-4">
                  <div className="font-700 text-sm text-ink-800">Feriados y días inhabilitados</div>
                  <span className="text-xs text-ink-400">{(config.feriados || []).length} registrados</span>
                </div>
                <div className="space-y-2 mb-4">
                  {(config.feriados || []).length === 0 && (
                    <div className="text-xs text-ink-400 py-2">No hay feriados registrados. Agregá fechas para bloquear entregas.</div>
                  )}
                  {(config.feriados || []).map((f, idx) => (
                    <div key={idx} className="flex items-center gap-3 rounded-lg border border-ink-100 bg-ink-50 p-3">
                      <div className="flex items-center gap-1.5 min-w-[110px]">
                        <Icon.Calendar />
                        <span className="font-700 text-sm text-ink-900">{f.fecha}</span>
                      </div>
                      <div className="text-xs text-ink-600 flex-1">{f.motivo}</div>
                      <span className={`badge text-xs ${f.universidad ? 'bg-accent-muted text-accent' : 'bg-red-50 text-red-600'}`}>{f.universidad || 'Todas las universidades'}</span>
                      <button className="text-xs text-red-500 hover:text-red-700 font-700 px-2 py-1 rounded-lg hover:bg-red-50 transition-colors" onClick={() => removeHoliday(idx)}>Eliminar</button>
                    </div>
                  ))}
                </div>
                <div className="rounded-xl border border-ink-100 bg-ink-50 p-4">
                  <div className="text-xs font-700 text-ink-500 uppercase tracking-wide mb-3">Agregar feriado</div>
                  <div className="grid gap-3 md:grid-cols-4">
                    <input type="date" className="input-field" value={newHoliday.fecha} onChange={e => setNewHoliday(current => ({ ...current, fecha: e.target.value }))} />
                    <input type="text" className="input-field" placeholder="Motivo (ej: Paro, Desinfección)" value={newHoliday.motivo} onChange={e => setNewHoliday(current => ({ ...current, motivo: e.target.value }))} />
                    <select className="input-field" value={newHoliday.universidad} onChange={e => setNewHoliday(current => ({ ...current, universidad: e.target.value }))}>
                      <option value="">Todas las universidades</option>
                      {universities.map(u => <option key={u} value={u}>{u}</option>)}
                    </select>
                    <button className="btn-primary text-xs" onClick={addHoliday} disabled={!newHoliday.fecha || !newHoliday.motivo}>Agregar feriado</button>
                  </div>
                </div>
              </div>

              <div className="card p-5">
                <div className="font-700 text-sm text-ink-800 mb-4">Universidades y ventanas de entrega</div>
                <div className="space-y-6">
                  {getCareers(config, books).map(career => (
                    <div key={career.id_carrera} className="rounded-xl border border-ink-100 bg-ink-50 p-4">
                      <div className="flex items-start justify-between gap-4 mb-3">
                        <div>
                          <div className="font-800 text-sm text-ink-900">{careerLabel(career)}</div>
                          <div className="text-xs text-ink-500 mt-0.5">{career.direccion_entrega}</div>
                        </div>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {(career.ventanas || []).map((window, wIdx) => {
                          const isActive = window.activa !== false;
                          return (
                            <button
                              key={`${career.id_carrera}-${wIdx}`}
                              onClick={() => toggleWindow(career.id_carrera, wIdx)}
                              className={`inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-xs font-700 border transition-all ${
                                isActive
                                  ? 'bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100'
                                  : 'bg-gray-100 text-gray-400 border-gray-200 hover:bg-gray-200'
                              }`}
                              title={isActive ? 'Clic para desactivar' : 'Clic para activar'}
                            >
                              <span className={`w-1.5 h-1.5 rounded-full ${isActive ? 'bg-emerald-500' : 'bg-gray-300'}`} />
                              {window.label} · {window.horario}
                            </button>
                          );
                        })}
                        {(career.ventanas || []).length === 0 && (
                          <span className="text-xs text-ink-400">Sin ventanas configuradas</span>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function createDemoOrders(books, config) {
      const today = new Date().toISOString().split('T')[0];
      const tomorrowDate = new Date();
      tomorrowDate.setDate(tomorrowDate.getDate() + 1);
      const tomorrow = tomorrowDate.toISOString().split('T')[0];
      const sample = [
        { book: books[0], nombre: 'Lucia Fernandez', pago: 'total', fecha: today, turno: 'tarde', express: false, estado: 'Pendiente de impresión' },
        { book: books[3], nombre: 'Martin Sosa', pago: 'sena', fecha: tomorrow, turno: 'manana', express: true, estado: 'Imprimiendo' },
        { book: books[5], nombre: 'Ana Juarez', pago: 'total', fecha: tomorrow, turno: 'tarde', express: false, estado: 'Listo' }
      ].filter(entry => entry.book);

      return sample.map((entry, index) => {
        const formato = getBookFormats(entry.book)[0];
        const career = getCareer(config, books, bookCareerId(entry.book));
        const horario = entry.turno === 'manana' ? '10:00' : '19:00';
        const pricing = calcPrecioItem(entry.book, formato, 'basica', config, false, entry.express);
        const total = pricing.total;
        const monto = entry.pago === 'sena' ? roundTotal(total * 0.5, config) : total;
        return {
          id: `P00${index + 1}`,
          nombre: entry.nombre,
          whatsapp: `11600000${index + 1}`,
          items: [{
            id: `${entry.book.id}-${index}`,
            libroId: entry.book.id,
            titulo: entry.book.titulo,
            materia: entry.book.materia,
            carrera: entry.book.carrera,
            id_carrera: bookCareerId(entry.book),
            paginas: entry.book.paginas,
            hojas: pricing.hojas,
            formato,
            encuadernacion: 'basica',
            color: false,
            express: entry.express,
            precio: total,
            tipo: pricing.tipo,
            imagen_url: entry.book.imagen_url
          }],
          libro: entry.book.titulo,
          carrera: entry.book.carrera,
          id_carrera: bookCareerId(entry.book),
          materia: entry.book.materia,
          formato: `${formato} B/N${entry.express ? ' Express' : ''}`,
          paginas: entry.book.paginas,
          hojas: pricing.hojas,
          subtotal: total,
          total,
          monto_pagado: monto,
          saldo_pendiente: Math.max(0, total - monto),
          pago_modalidad: entry.pago,
          estado: entry.estado,
          fecha: entry.fecha,
          turno: entry.turno,
          modalidad_entrega: 'Retiro facultad',
          express: entry.express,
          ventana_retiro: `${entry.fecha} · ${horario}`,
          lugar_entrega: careerAddress(career, config),
          horario_entrega: horario,
          talo_ref: `DEMO-P00${index + 1}`,
          ts: new Date().toISOString()
        };
      });
    }

    function App() {
      const [screen, setScreen] = React.useState('home');
      const [bookSel, setBookSel] = React.useState(null);
      const [carrito, setCarrito] = React.useState([]);
      const [books, setBooks] = React.useState([]);
      const [config, setConfig] = React.useState(FALLBACK_CONFIG);
      const [orders, setOrders] = React.useState([]);
      const [catalogFilters, setCatalogFilters] = React.useState({ career: '', query: '', materia: '' });
      const [checkoutForm, setCheckoutForm] = React.useState({ nombre: '', whatsapp: '', pago: 'total', modalidad: 'Retiro facultad' });
      const [sidebarOpen, setSidebarOpen] = React.useState(false);
      const [loading, setLoading] = React.useState(true);
      const [adminAuthed, setAdminAuthed] = React.useState(loadLocal(STORAGE.admin, false));

      React.useEffect(() => {
        async function init() {
          const loadedConfig = await loadJson('./config.json', FALLBACK_CONFIG);
          const savedConfig = loadLocal(STORAGE.config, null);
          const mergedConfig = normalizeConfig(savedConfig ? { ...loadedConfig, ...savedConfig } : loadedConfig);
          const savedBooks = loadLocal(STORAGE.libros, null);
          const loadedBooks = savedBooks || await loadJson('./libros.json', []);
          const migratedBooks = loadedBooks.map(b => migrateBook(b, mergedConfig));
          const savedOrders = loadLocal(STORAGE.pedidos, null);
          const savedCarrito = loadLocal(STORAGE.carrito, []);
          const savedForm = loadLocal(STORAGE.checkoutForm, null);
          const savedCliente = loadLocal(STORAGE.cliente, null);
          setConfig(mergedConfig);
          setBooks(migratedBooks);
          if (savedCarrito && savedCarrito.length > 0) setCarrito(savedCarrito);
          if (savedForm) setCheckoutForm(savedForm);
          if (savedCliente && !savedForm) setCheckoutForm(current => ({ ...current, ...savedCliente }));

          const sheetsOrders = await fetchOrdersFromSheets(mergedConfig);
          if (sheetsOrders && sheetsOrders.length > 0) {
            setOrders(sheetsOrders.map(order => normalizeOrder(order, mergedConfig)));
          } else {
            setOrders(savedOrders ? savedOrders.map(order => normalizeOrder(order, mergedConfig)) : createDemoOrders(migratedBooks, mergedConfig));
          }
          setLoading(false);
        }
        init();
      }, []);

      React.useEffect(() => {
        if (!loading) saveLocal(STORAGE.config, config);
      }, [config, loading]);

      React.useEffect(() => {
        if (!loading) saveLocal(STORAGE.pedidos, orders);
      }, [orders, loading]);

      React.useEffect(() => {
        if (!loading) saveLocal(STORAGE.libros, books);
      }, [books, loading]);

      React.useEffect(() => {
        if (!loading) {
          saveLocal(STORAGE.checkoutForm, checkoutForm);
          saveLocal(STORAGE.cliente, { nombre: checkoutForm.nombre, whatsapp: checkoutForm.whatsapp });
        }
      }, [checkoutForm, loading]);

      const navItems = [
        { id: 'home', label: 'Catalogo', icon: <Icon.Book /> },
        { id: 'checkout', label: 'Mi pedido', icon: <Icon.Cart />, badge: carrito.length },
        { id: 'tracking', label: 'Segui tu pedido', icon: <Icon.Bell /> },
        { id: 'ayuda', label: 'Ayuda', icon: <Icon.Help /> },
        { id: 'admin', label: 'Administracion', icon: <Icon.Settings /> }
      ];
      const isAdmin = screen === 'admin';

      if (loading) {
        return <div className="page-loader"><div className="card p-6 flex items-center gap-3"><Spinner /> Cargando catalogo y configuracion...</div></div>;
      }

      return (
        <div className="min-h-screen bg-ink-50 font-sans">
          <nav className="bg-white border-b border-ink-100 sticky top-0 z-50">
            <div className={`mx-auto px-4 h-14 flex items-center justify-between ${isAdmin ? 'max-w-[1440px]' : 'max-w-6xl'}`}>
              <button onClick={() => setScreen('home')} className="flex items-center gap-2.5">
                <div className="w-8 h-8 rounded-xl bg-ink-900 flex items-center justify-center text-white text-sm">IS</div>
                <span className="font-800 text-ink-900 text-base leading-none">Imprenta<br /><span className="text-brand-DEFAULT text-xs font-700">Sync 2026</span></span>
              </button>
              <div className="hidden sm:flex items-center gap-1">
                {navItems.map(item => (
                  <button key={item.id} onClick={() => setScreen(item.id)} className={`relative flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-700 transition-all ${screen === item.id || (screen === 'ficha' && item.id === 'home') ? 'bg-ink-900 text-white' : 'text-ink-500 hover:bg-ink-100'}`}>
                    {item.icon}{item.label}
                    {item.badge > 0 && <span className="absolute -top-1 -right-1 w-4 h-4 bg-accent text-white rounded-full text-xs flex items-center justify-center font-800">{item.badge}</span>}
                  </button>
                ))}
              </div>
              <div className="flex sm:hidden items-center gap-2">
                {carrito.length > 0 && (
                  <button onClick={() => setScreen('checkout')} className="relative">
                    <Icon.Cart />
                    <span className="absolute -top-1 -right-1 w-4 h-4 bg-accent text-white rounded-full text-xs flex items-center justify-center font-800">{carrito.length}</span>
                  </button>
                )}
                <button onClick={() => setSidebarOpen(true)} className="p-1"><Icon.Menu /></button>
              </div>
            </div>
          </nav>

          {sidebarOpen && (
            <div className="fixed inset-0 z-50" onClick={() => setSidebarOpen(false)}>
              <div className="absolute inset-0 bg-black/30 backdrop-blur-sm" />
              <div className="absolute right-0 top-0 bottom-0 w-64 bg-white shadow-xl p-4" onClick={event => event.stopPropagation()}>
                <div className="flex justify-between items-center mb-5">
                  <span className="font-800 text-ink-900">Menu</span>
                  <button onClick={() => setSidebarOpen(false)}><Icon.X /></button>
                </div>
                {navItems.map(item => (
                  <button key={item.id} onClick={() => { setScreen(item.id); setSidebarOpen(false); }} className={`sidebar-link w-full ${screen === item.id ? 'active' : ''}`}>
                    {item.icon}{item.label}
                    {item.badge > 0 && <span className="ml-auto badge bg-accent text-white">{item.badge}</span>}
                  </button>
                ))}
              </div>
            </div>
          )}

          <main className={`mx-auto py-6 pb-24 ${isAdmin ? 'max-w-full px-8' : 'max-w-6xl px-4'}`}>
            {screen === 'home' && <HomeScreen books={books} config={config} carrito={carrito} catalogFilters={catalogFilters} setCatalogFilters={setCatalogFilters} onSelectLibro={book => { setBookSel(book); setScreen('ficha'); }} />}
            {screen === 'ficha' && bookSel && (
              <FichaScreen
                book={bookSel}
                config={config}
                onVolver={() => setScreen('home')}
                onAgregar={(item, isExpress) => {
                  if (isExpress) {
                    setCarrito([item]);
                    setScreen('checkout');
                  } else {
                    setCarrito(current => [...current, item]);
                    setScreen('home');
                  }
                }}
              />
            )}
            {screen === 'checkout' && <CheckoutScreen carrito={carrito} pedidos={orders} setPedidos={setOrders} config={config} onVolver={() => setScreen('home')} onSuccess={() => { setCarrito([]); setScreen('home'); }} setCarrito={setCarrito} form={checkoutForm} setForm={setCheckoutForm} />}
            {screen === 'tracking' && <OrderTracker orders={orders} config={config} onVolver={() => setScreen('home')} />}
            {screen === 'ayuda' && <AyudaScreen onVolver={() => setScreen('home')} />}
            {screen === 'admin' && (
              adminAuthed
                ? <AdminPanel orders={orders} setOrders={setOrders} books={books} setBooks={setBooks} config={config} setConfig={setConfig} onLogout={async () => { const sb = window.supabase.createClient(config.supabase.url, config.supabase.anon_key); await sb.auth.signOut(); saveLocal(STORAGE.admin, false); setAdminAuthed(false); }} />
                : <AdminLogin config={config} onSuccess={setAdminAuthed} />
            )}
          </main>

          <div className="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-ink-100 flex z-40">
            {navItems.map(item => (
              <button key={item.id} onClick={() => setScreen(item.id)} className={`flex-1 flex flex-col items-center gap-1 py-3 text-xs font-700 transition-colors relative ${screen === item.id || (screen === 'ficha' && item.id === 'home') ? 'text-brand-DEFAULT' : 'text-ink-400'}`}>
                {item.icon}
                <span>{item.label}</span>
                {item.badge > 0 && <span className="absolute top-2 right-1/4 w-4 h-4 bg-accent text-white rounded-full text-xs flex items-center justify-center font-800">{item.badge}</span>}
              </button>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
