      color: #0D1117;

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #E8ECF2;
    }

    ::-webkit-scrollbar-thumb {
      background: #9BAABB;
      border-radius: 3px;
    }

    .fade-in {
      animation: fadeIn .25s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner-sm {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .slide-up {
      animation: slideUp .3s cubic-bezier(.22, 1, .36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .btn-press:active {
      transform: scale(.98);
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus {
      outline: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-weight: 700;
      font-size: .7rem;
      padding: 3px 9px;
      letter-spacing: .02em;
    }

    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #E8ECF2;
    }

    .stat-card {
      background: white;
      border-radius: 16px;
      border: 1px solid #E8ECF2;
      padding: 20px;
    }

    .input-field {
      width: 100%;
      border: 1.5px solid #C9D1DF;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: .92rem;
      color: #0D1117;
      background: white;
      transition: border .15s, box-shadow .15s;

    .input-field:focus {

      box-shadow: 0 0 0 4px rgba(0, 102, 255, .08);
    }

    .input-field::placeholder {
      color: #9BAABB;
    }

    .btn-primary {
      background: #0066FF;
      color: white;
      border: none;
      border-radius: 12px;

      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .btn-primary:hover {
      background: #0052CC;
    }

    .btn-primary:disabled {
      background: #C9D1DF;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: white;
      color: #0D1117;
      border: 1.5px solid #C9D1DF;

      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;

    .btn-secondary:hover {
      border-color: #0066FF;

      border-radius: 10px;

      font-weight: 600;
      color: #4A5C70;
      cursor: pointer;
      transition: all .15s;

    .sidebar-link:hover {

      color: #0052CC;
    }

    }

      background: #E8ECF2;
      border-radius: 4px;
      overflow: hidden;
    }

      border-radius: 4px;

    }

      background: #E8F0FF;
    }

      opacity: .55;
      cursor: not-allowed;
      background: #F5F7FA;
    }

    .talo-box {
      background: linear-gradient(135deg, #0D1117 0%, #1E2E3D 100%);
      border-radius: 16px;
      padding: 24px;
      color: white;
      border: 1.5px solid rgba(34, 197, 94, 0.45);
      box-shadow: 0 0 32px rgba(34, 197, 94, 0.18), 0 0 64px rgba(34, 197, 94, 0.08), 0 8px 24px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .talo-box::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.22) 0%, transparent 70%);
      pointer-events: none;
    }

    .talo-box::after {
      content: '';
      position: absolute;
      bottom: -30px;
      left: -30px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-glow {
      background: linear-gradient(135deg, #0D1117 0%, #162032 100%);
      border-radius: 16px;
      padding: 24px;
      color: white;
      border: 1.5px solid rgba(56, 189, 248, 0.45);
      box-shadow: 0 0 32px rgba(56, 189, 248, 0.18), 0 0 64px rgba(56, 189, 248, 0.08), 0 8px 24px rgba(0, 0, 0, 0.4);
      position: relative;
      overflow: hidden;
    }

    .hero-glow::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.22) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-glow::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }

      font-size: .74rem;
      font-weight: 700;
    }

    .combo-panel {

      z-index: 30;
      left: 0;
      right: 0;
      top: calc(100% + 8px);
      background: white;
      border: 1px solid #E8ECF2;
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(13, 17, 23, .1);
      max-height: 260px;
      overflow: auto;
    }

      cursor: pointer;
      transition: background .15s;
    }

    .combo-option:hover {
      background: #F5F7FA;
    }

      overflow: auto;
      border: 1px solid #E8ECF2;
      border-radius: 16px;
      background: white;
    }

    .table-shell table {
      width: 100%;
      border-collapse: collapse;
    }

    .table-shell th {

      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #6B7D94;
      padding: 14px 16px;
      background: #F5F7FA;
      border-bottom: 1px solid #E8ECF2;
      position: relative;
      user-select: none;
      cursor: pointer;
      transition: background .15s;
    }

    .table-shell th:hover {
      background: #E8ECF2;
    }

      margin-left: 6px;
      opacity: .4;
      font-size: .65rem;
    }

    .table-shell th.sort-asc .sort-icon,
    .table-shell th.sort-desc .sort-icon {
      opacity: 1;
      color: #0066FF;
    }

    .resize-handle {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 5px;
      cursor: col-resize;
      z-index: 10;
    }

    .resize-handle:hover {
      background: #0066FF;
    }

    .table-shell td {
      padding: 15px 16px;
      border-bottom: 1px solid #F5F7FA;
      vertical-align: top;
      font-size: .88rem;
    }

    .table-shell tr:hover td {
      background: inherit;
    }

    .cover-img {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid #E8ECF2;
      display: block;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 12px;
    }

    .radio-tile {
      border: 1.5px solid #C9D1DF;
      border-radius: 14px;
      padding: 14px;
      text-align: left;
      transition: all .15s;
      cursor: pointer;
      background: white;
    }

    .radio-tile.active {
      border-color: #0066FF;
      background: #E8F0FF;
    }

    .page-loader {
      min-height: 50vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 1280px) {
      .filter-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .filter-grid {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .no-print {
        display: none !important;
      }
    }

    .timeline {
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      padding: 8px 0;
    }
    .timeline-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      min-width: 72px;
      flex: 1;
    }
    .timeline-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      transition: all .3s;
      z-index: 1;
    }
    .timeline-dot.completed {
      background: #00B67A;
      color: white;
      box-shadow: 0 2px 8px rgba(0,182,122,.3);
    }
    .timeline-dot.current {
      background: #0066FF;
      color: white;
      box-shadow: 0 2px 12px rgba(0,102,255,.4);
      animation: pulse 2s infinite;
    }
    .timeline-dot.pending {
      background: #E8ECF2;
      color: #9BAABB;
    }
    .timeline-label {
      font-size: 9px;
      text-align: center;
      margin-top: 6px;
      line-height: 1.3;
      font-weight: 600;
    }
    .timeline-label.completed { color: #00875A; }
    .timeline-label.current { color: #0066FF; }
    .timeline-label.pending { color: #9BAABB; }
    .timeline-line {
      flex: 1;
      height: 2px;
      margin: 0 2px;
      align-self: center;
      margin-bottom: 22px;
    }
    .timeline-line.completed { background: #00B67A; }
    .timeline-line.pending { background: #E8ECF2; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 2px 12px rgba(0,102,255,.4); }
      50% { box-shadow: 0 2px 20px rgba(0,102,255,.6); }
    }

    .notification-banner {
      background: linear-gradient(135deg, #0066FF 0%, #0052CC 100%);
      color: white;
      border-radius: 16px;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
    }
    .notification-banner::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,.1);
      border-radius: 50%;
    }

    .order-action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      border: none;
      width: 100%;
      justify-content: center;
    }
  </style>
</head>

    };

    function fmt(n) {
      return `$${Number(n || 0).toLocaleString('es-AR')}`;
    }

    function slug(text) {
      return String(text || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    }

    function normalizePhone(value) {
      return String(value || '').replace(/\D/g, '');
    }

    function isWeekend(date) {
      const dow = date.getDay();
      return dow === 0 || dow === 6;
    }

    function HOJAS(paginas, paginasPorHoja = 2) {
      return Math.ceil(Number(paginas || 0) / (Number(paginasPorHoja) || 2));
    }

    function getBookFormats(book) {
      if (Array.isArray(book.formatos_disponibles) && book.formatos_disponibles.length) return book.formatos_disponibles;
      if ('a4_bn_habilitado' in book) {
        const fmts = new Set();
        if (book.a4_bn_habilitado || book.a4_color_habilitado) fmts.add('A4');
        if (book.a5_bn_habilitado || book.a5_color_habilitado) fmts.add('A5');
        return [...fmts];
      }
      return [
        book.formato_a4 !== false ? 'A4' : null,
        book.formato_a5 ? 'A5' : null
      ].filter(Boolean);
    }

    function getBookCombinations(book) {
      return COMBO_KEYS
        .filter(key => book[`${key}_habilitado`] && Number(book[`${key}_final`]) > 0)
        .map(key => ({ key, label: COMBO_LABELS[key], formato: key.startsWith('a4') ? 'A4' : 'A5', color: key.endsWith('color'), precio: Number(book[`${key}_final`]) }));
    }

    function getMinPrice(book) {
      const combos = getBookCombinations(book);
      return combos.length ? Math.min(...combos.map(c => c.precio)) : 0;
    }

    function calcSugerido(paginas, formato, config, paginasPorHoja = 2) {
      const hojas = HOJAS(paginas, paginasPorHoja);
      let sub = 0;
      if (formato === 'A5') {
        sub = hojas * Number(config.precios?.A5?.unico || 49);
      } else {
        sub = hojas * Number(hojas >= 50 ? config.precios?.A4?.mas_50 || 70 : config.precios?.A4?.menos_50 || 90);
      }
      if (hojas >= (config.encuadernacion?.umbral_anillado_hojas || 40)) {
        sub += Number(config.encuadernacion?.basica || 600);
      }
      return sub;
    }

    function migrateBook(book, config) {
      if ('a4_bn_habilitado' in book) {
        const migrated = { ...book };
        if (!('paginas_por_hoja' in migrated)) migrated.paginas_por_hoja = 2;
        if (!('pdf_url' in migrated)) migrated.pdf_url = '';
        return migrated;
      }
      const a4s = calcSugerido(book.paginas, 'A4', config);
      const a5s = calcSugerido(book.paginas, 'A5', config);
      return {
        ...book,
        paginas_por_hoja: 2,
        pdf_url: '',
        activo: book.activo !== false,
        a4_bn_habilitado: book.formato_a4 !== false,
        a4_bn_sugerido: a4s, a4_bn_ajuste: 0, a4_bn_final: a4s,
        a4_color_habilitado: (book.formato_a4 !== false) && Number(book.precio_color) > 0,
        a4_color_final: Number(book.precio_color) || 0,
        a5_bn_habilitado: Boolean(book.formato_a5),
        a5_bn_sugerido: a5s, a5_bn_ajuste: 0, a5_bn_final: a5s,
        a5_color_habilitado: false, a5_color_final: 0
      };
    }

    function recalcBookSugeridos(book, config) {
      const pph = Number(book.paginas_por_hoja) || 2;
      const a4s = calcSugerido(book.paginas, 'A4', config, pph);
      const a5s = calcSugerido(book.paginas, 'A5', config, pph);
      return {
        ...book,
        a4_bn_sugerido: a4s, a4_bn_final: a4s + Number(book.a4_bn_ajuste || 0),
        a5_bn_sugerido: a5s, a5_bn_final: a5s + Number(book.a5_bn_ajuste || 0)
      };
    }

    function bookCareerId(book) {
      return book.id_carrera || slug(book.carrera);
    }

    function getCareers(config, books = []) {
      const configured = Array.isArray(config.carreras) ? config.carreras : [];
      const fromBooks = books.map(book => ({
        id_carrera: bookCareerId(book),
        nombre: book.carrera,
        universidad: book.universidad || '',
        direccion_entrega: config.facultad?.lugar || 'Dirección de facultad según carrera',
        ventanas: []
      }));
      const byId = new Map([...fromBooks, ...configured].map(career => [career.id_carrera || slug(career.nombre), career]));
      return [...byId.values()].filter(career => career.nombre).sort((a, b) => careerLabel(a).localeCompare(careerLabel(b)));
    }

    function getCareer(config, books, id) {
      const careers = getCareers(config, books);
      return careers.find(career => (career.id_carrera || slug(career.nombre)) === id) || careers[0] || null;
    }

    function careerLabel(career) {
      return career ? `${career.nombre}${career.universidad && !career.nombre.includes(career.universidad) ? ` · ${career.universidad}` : ''}` : '';
    }

    function careerAddress(career, config) {
      return career?.direccion_entrega || config.carreras?.[0]?.direccion_entrega || config.facultad?.lugar || 'Dirección de facultad según carrera';
    }

    function deliveryPlaceFor(modalidad, career, config) {
      if (modalidad === 'Retiro domicilio') return 'Chijra, se coordina por WhatsApp';
      if (modalidad === 'Cadete') return 'Se coordina por WhatsApp';
      return careerAddress(career, config);
    }

    function roundTotal(value, config) {
      const base = Number(value || 0);
      const multiple = config?.redondeo?.multiplo || 200;
      return window.roundingUtils.roundToMultiple(base, multiple);
    }

    function calcPrecioItem(libro, formato, encuadernacion, config, color, express = false) {
      const pph = Number(libro.paginas_por_hoja) || 2;
      const hojas = HOJAS(libro.paginas, pph);
      // New 4-combination model: read precio_final directly
      if ('a4_bn_habilitado' in libro) {
        const comboKey = `${formato.toLowerCase()}_${color ? 'color' : 'bn'}`;
        const precioFinal = Number(libro[`${comboKey}_final`] || 0);
        const tipo = hojas >= config.encuadernacion.umbral_anillado_hojas ? 'anillado' : 'abrochado';
        // NO rounding here — rounding only at cart total
        return { hojas, subtotal: precioFinal, total: precioFinal, tipo };
      }
      // Legacy fallback
      let subtotal = 0;
      if (color && Number(libro.precio_color) > 0) {
        subtotal = Number(libro.precio_color);
      } else if (formato === 'A5') {
        subtotal = hojas * Number(config.precios?.A5?.unico || config.precios?.A5?.mas_50 || 49);
      } else {
        const key = hojas >= 50 ? 'mas_50' : 'menos_50';
        subtotal = hojas * Number(config.precios?.A4?.[key] || 0);
      }
      const tipo = hojas >= config.encuadernacion.umbral_anillado_hojas ? 'anillado' : 'abrochado';
      if (tipo === 'anillado') {
        subtotal += Number(config.encuadernacion.basica || 0);
      }
      return { hojas, subtotal, total: subtotal, tipo };
    }

    function computeOrderStatus(montoPagado) {
      return montoPagado > 0 ? 'Pendiente de impresión' : 'Pendiente de pago';
    }

    function buildOrder(items, form, slot, config, career) {
      const pages = items.reduce((acc, item) => acc + item.paginas, 0);
      const hojas = items.reduce((acc, item) => acc + item.hojas, 0);
      const subtotal = items.reduce((acc, item) => acc + item.precio, 0);
      const total = roundTotal(subtotal, config);
      const montoPagado = form.pago === 'sena' ? roundTotal(total * 0.5, config) : total;
      const saldo = Math.max(0, total - montoPagado);
      const id = `P${String(Date.now()).slice(-6)}`;
      const modalidad = form.modalidad || 'Retiro facultad';
      const hasWindow = modalidad === 'Retiro facultad' && slot;
      return {
        id,
        nombre: form.nombre,
        whatsapp: normalizePhone(form.whatsapp),
        items,
        libro: items.map(item => item.titulo).join(' + '),
        carrera: [...new Set(items.map(item => item.carrera))].join(' / '),
        id_carrera: career?.id_carrera || items[0]?.id_carrera || '',
        materia: [...new Set(items.map(item => item.materia))].join(' / '),
        formato: [...new Set(items.map(item => `${item.formato} ${item.color ? 'Color' : 'B/N'}${item.express ? ' Express' : ''}`))].join(' / '),
        paginas: pages,
        hojas,
        subtotal,
        total,
        monto_pagado: montoPagado,
        saldo_pendiente: saldo,
        pago_modalidad: form.pago,
        estado: computeOrderStatus(montoPagado),
        fecha: slot ? slot.fecha : '',
        turno: slot ? slot.turno : '',
        modalidad_entrega: modalidad,
        express: items.some(item => item.express),
        ventana_retiro: slot ? `${slot.label || fechaLabel(slot.fecha, slot.dOffset)} · ${slot.horario}` : 'Se coordina por WhatsApp',
        lugar_entrega: deliveryPlaceFor(modalidad, career, config),
        horario_entrega: slot ? slot.horario : 'A coordinar',
        talo_ref: `TALO-${id}`,
        ts: new Date().toISOString()
      };
    }

    function orderPagesForCapacity(order) {
      return order.estado === 'Pendiente de impresión' || order.estado === 'Imprimiendo' || order.estado === 'Para encuadernar' || order.estado === 'Listo'
        ? Number(order.paginas || 0)
        : 0;
    }

    function normalizeOrder(order, config) {
      const estado = order.estado === 'Impreso' ? 'Listo' : order.estado;
      const modalidad = order.modalidad_entrega || 'Retiro facultad';
      const horario = order.horario_entrega || (order.turno === 'manana' ? '10:00' : '19:00');
      const lugarGuardado = String(order.lugar_entrega || '').includes('Punto de entrega') ? '' : order.lugar_entrega;
      return {
        ...order,
        estado,
        modalidad_entrega: modalidad,
        ventana_retiro: order.ventana_retiro || (modalidad === 'Cadete' || modalidad === 'Retiro domicilio' ? 'Se coordina por WhatsApp' : `${order.fecha || ''} · ${horario}`),
        lugar_entrega: lugarGuardado || config.carreras?.[0]?.direccion_entrega || 'Dirección de facultad según carrera',
        horario_entrega: horario,
        talo_ref: order.talo_ref || `LOCAL-${order.id || Date.now()}`,
        asistencia_confirmada: order.asistencia_confirmada || false,
        asistencia_ts: order.asistencia_ts || null
      };
    }

    /* ========================================================
       FUNCIONES DE GESTION DE PEDIDOS (ocultas al alumno)
       Se exponen solo en el panel admin por ahora.
       ======================================================== */

    function payOrderBalance(order, setOrders, config) {
      const nuevoPagado = order.total;
      const updated = { ...order, monto_pagado: nuevoPagado, saldo_pendiente: 0, estado: computeOrderStatus(nuevoPagado) };
      setOrders(prev => prev.map(o => o.id === order.id ? updated : o));
      syncOrderToSheets(updated, config);
      return updated;
    }

    function rescheduleOrder(order, newFecha, newTurno, newHorario, newLabel, setOrders, config) {
      const updated = {
        ...order,
        fecha: newFecha,
        turno: newTurno,
        horario_entrega: newHorario,
        ventana_retiro: `${newLabel || newFecha} · ${newHorario}`,
        asistencia_confirmada: false,
        asistencia_ts: null
      };
      setOrders(prev => prev.map(o => o.id === order.id ? updated : o));
      syncOrderToSheets(updated, config);
      return updated;
    }

    function confirmAttendance(order, setOrders, config) {
      const updated = {
        ...order,
        asistencia_confirmada: true,
        asistencia_ts: new Date().toISOString()
      };
      setOrders(prev => prev.map(o => o.id === order.id ? updated : o));
      syncOrderToSheets(updated, config);
      return updated;
    }

    function getOrdersByPhone(orders, phone) {
      const normalized = normalizePhone(phone);
      if (normalized.length < 8) return [];
      return orders.filter(order => normalizePhone(order.whatsapp) === normalized);
    }

    function isDeliveryDay(order) {
      if (!order.fecha) return false;
      const today = new Date().toISOString().split('T')[0];
      return order.fecha === today;
    }

    function needsAttendanceConfirmation(order) {
      const readyStates = ['Listo'];
      return readyStates.includes(order.estado) && isDeliveryDay(order) && !order.asistencia_confirmada;
    }

    async function generateWhatsAppMessageForOrder(order, config) {
      const url = config.integraciones?.SHEETS_API_URL;
      if (!url) return buildWhatsAppMessage(order);
      try {
        const librosPayload = order.items ? order.items.map(i => ({
          titulo: i.titulo,
          hojas: i.hojas,
          paginas: i.paginas,
          precio: i.precio
        })) : [{ titulo: order.libro, hojas: order.hojas, paginas: order.paginas, precio: order.total }];
        
        const data = JSON.stringify({
          nombre: order.nombre,
          whatsapp: order.whatsapp,
          libros: librosPayload,
          fecha: order.fecha,
          lugar_entrega: order.lugar_entrega || '',
          saldo: Number(order.saldo_pendiente) || 0
        });
        
        const sheetsBase = url.split('/exec')[0] + '/exec';
        const response = await fetch(`${sheetsBase}?mode=generate-wa&data=${encodeURIComponent(data)}`);
        if (!response.ok) throw new Error('Error');
        const result = await response.json();
        if (result.msj_ws) return result.msj_ws;
      } catch (err) {
        console.warn('Fallo al generar mensaje con Gemini, usando fallback:', err);
      }
      return buildWhatsAppMessage(order);
    }

    async function syncOrderToSheets(order, config) {
      const url = config.integraciones?.SHEETS_API_URL;
      if (!url) return;
      try {
        await fetch(url, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'text/plain'
          },
          body: JSON.stringify(order)
        });
      } catch (err) {
        console.error('Error sincronizando con Sheets:', err);
      }
    }

    async function fetchOrdersFromSheets(config) {
      const url = config.integraciones?.SHEETS_API_URL;
      if (!url) return null;
      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Error al leer Sheets');
        const data = await response.json();
        return Array.isArray(data) ? data : null;
      } catch (err) {
        console.error('Error obteniendo pedidos desde Sheets:', err);
        return null;
      }
    }

    function getNextBusinessDay(fechaStr) {
      const date = new Date(`${fechaStr}T12:00:00`);
      date.setDate(date.getDate() + 1);
      if (date.getDay() === 0) date.setDate(date.getDate() + 1);
      return date.toISOString().split('T')[0];
    }

    function isFeriado(config, fecha, universidad) {
      const feriados = config?.feriados || [];
      return feriados.find(f => {
        if (f.fecha !== fecha) return false;
        if (!f.universidad) return true;
        return f.universidad === universidad;
      }) || null;
    }

    function getDayUsage(pedidos, fecha, isExpress = false) {
      const primary = pedidos
        .filter(order => order.fecha === fecha && (isExpress ? order.express : !order.express))
        .reduce((acc, order) => acc + orderPagesForCapacity(order), 0);
      const secondary = pedidos
        .filter(order => order.segunda_entrega_fecha === fecha && (isExpress ? order.express : !order.express))
        .reduce((acc, order) => acc + (order.hojas_segunda_entrega || 0), 0);
      return primary + secondary;
    }

    function getSlotDeadline(slotDate, slotHorario, horasAnticipacion) {
      const [year, month, day] = slotDate.split('-').map(Number);
      const [hours, minutes] = (slotHorario || '19:00').split(':').map(Number);
      const deadline = new Date(year, month - 1, day, hours, minutes || 0);
      deadline.setHours(deadline.getHours() - horasAnticipacion);
      return deadline;
    }

    function formatDeadline(date) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const deadlineDay = new Date(date.getFullYear(), date.getMonth(), date.getDate());
      const diffMs = deadlineDay.getTime() - today.getTime();
      const diffDays = Math.round(diffMs / 86400000);
      const timeStr = date.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
      if (diffDays === 0) return `hoy a las ${timeStr}`;
      if (diffDays === 1) return `mañana a las ${timeStr}`;
      return `${date.toLocaleDateString('es-AR', { weekday: 'short' })} a las ${timeStr}`;
    }

    function getNextSlots(config, pedidos, career, isExpress = false) {
      const now = new Date();
      const dailyCap = isExpress
        ? (config.produccion.capacidad_express_paginas || 300)
        : config.produccion.capacidad_diaria_paginas;
      const horasAnticipacion = isExpress
        ? (config.produccion.horas_anticipacion_express || 2)
        : (config.produccion.horas_anticipacion || 20);
      const windows = (career?.ventanas || []).filter(window => window.activa !== false);
      const slots = [];

      for (let offset = 0; offset < 14; offset += 1) {
        const date = new Date(now);
        date.setDate(now.getDate() + offset);
        const day = date.getDay();
        const fecha = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        const used = getDayUsage(pedidos, fecha, isExpress);
        const remaining = dailyCap - used;
        let dayWindows = windows.length
          ? windows.filter(window => Number(window.dia) === day)
          : (isWeekend(date) ? [] : [
            { label: 'Manana', turno: 'manana', horario: '10:00', activa: true },
            { label: 'Tarde', turno: 'tarde', horario: '19:00', activa: true }
          ]);
        
        if (dayWindows.length === 0 && !isWeekend(date)) {
          dayWindows = [
            { label: 'Manana', turno: 'manana', horario: '10:00', activa: true },
            { label: 'Tarde', turno: 'tarde', horario: '19:00', activa: true }
          ];
        }

        const feriado = isFeriado(config, fecha, career?.universidad);
        dayWindows.forEach(window => {
          const turno = window.turno || 'tarde';
          const horario = window.horario || (turno === 'manana' ? '10:00' : '19:00');
          let disponible = remaining > 0 && !feriado;
          let bloqueado = feriado ? `Feriado: ${feriado.motivo || 'No laborable'}` : '';

          const slotDeadline = getSlotDeadline(fecha, horario, horasAnticipacion);
          if (!feriado && now >= slotDeadline) {
            disponible = false;
            bloqueado = `Cierra ${formatDeadline(slotDeadline)}`;
          }

          if (!feriado && remaining <= 0) {
            disponible = false;
            bloqueado = isExpress ? 'Agenda Express llena' : 'Agenda llena';
          }

          slots.push({
            fecha,
            turno,
            horario,
            label: window.label || `${fechaLabel(fecha, offset)} ${turno}`,
            disponible,
            bloqueado,
            dOffset: offset
          });
        });

        if (slots.filter(slot => slot.disponible).length >= 6) break;
      }
      return slots.slice(0, 8);
    }

    function fechaLabel(fecha, offset) {
      if (offset === 0) return 'Hoy';
      if (offset === 1) return 'Manana';
      const [year, month, day] = fecha.split('-').map(Number);
      return new Date(year, month - 1, day, 12, 0, 0).toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'short' });
    }

        entrega: { ...FALLBACK_CONFIG.entrega, ...(config?.entrega || {}) },

        supabase: { ...FALLBACK_CONFIG.supabase, ...(config?.supabase || {}) },

                    disabled={pricing.total <= 0}
                  >
                    <Icon.Zap /> Urgente · {fmt(Math.round(pricing.total * 1.2))}
                  </button>
                )}
              </div>
            </div>
          </div>

          {showPdfModal && (
            <div className="fixed inset-0 z-50 flex items-center justify-center" onClick={() => setShowPdfModal(false)}>
              <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" />
              <div className="relative bg-white rounded-2xl shadow-xl p-6 max-w-sm mx-4 w-full text-center" onClick={e => e.stopPropagation()}>
                <div className="w-12 h-12 rounded-full bg-ink-100 flex items-center justify-center mx-auto mb-4 text-ink-500">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
                <h3 className="font-800 text-lg text-ink-900 mb-2">Vista previa del libro</h3>
                <p className="text-sm text-ink-500 mb-6">Se mostrará una porción del libro para que verifiques el contenido antes de encargarlo.</p>
                <div className="flex gap-3">
                  <button
                    className="btn-primary flex-1"
                    onClick={() => {
                      setShowPdfModal(false);
                      window.open(workingBook.pdf_url, '_blank');
                    }}
                  >
                    Abrir PDF
                  </button>
                  <button className="btn-secondary" onClick={() => setShowPdfModal(false)}>
                    Cancelar
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function CheckoutScreen({ carrito, pedidos, setPedidos, config, onVolver, onSuccess, setCarrito, form, setForm }) {
      const [step, setStep] = React.useState(1);
      const [slotSel, setSlotSel] = React.useState(null);
      const [loading, setLoading] = React.useState(false);
      const [pedidoConfirmado, setPedidoConfirmado] = React.useState(null);
      const [expressItem, setExpressItem] = React.useState(null);
      const [expressConfirm, setExpressConfirm] = React.useState(null);
      const activeCareer = getCareer(config, carrito, carrito[0]?.id_carrera || '');
      const total = carrito.reduce((acc, item) => acc + item.precio, 0);
      const totalRounded = roundTotal(total, config);
      const anticipo = roundTotal(totalRounded * 0.5, config);
      const saldo = Math.max(0, totalRounded - anticipo);
      const totalHojas = carrito.reduce((acc, item) => acc + item.hojas, 0);
      const isExpressOrder = carrito.length === 1 && carrito[0]?.express;
      const dailyCap = isExpressOrder
        ? (config.produccion.capacidad_express_paginas || 300)
        : config.produccion.capacidad_diaria_paginas;
      const excedeCapacidad = !isExpressOrder && totalHojas > dailyCap;
      const slots = getNextSlots(config, pedidos, activeCareer, isExpressOrder);
      const needsSlot = form.modalidad === 'Retiro facultad';

      function getStateIndexForConfirm(estado) {
        if (estado === 'Pendiente de pago' || estado === 'Pendiente de impresión') return 0;
        if (estado === 'Imprimiendo' || estado === 'Para encuadernar') return 1;
        if (estado === 'Listo') return 2;
        if (estado === 'Entregado') return 3;
        return 0;
      }

      function toggleExpress(item) {
        if (item.express) {
          setCarrito(current => current.map(ci => ci.id === item.id ? { ...ci, express: false, precio: ci.precio / 1.2, expressRecargo: 0 } : ci));
        } else {
          setExpressItem(item);
          setExpressConfirm(null);
        }
      }

      function activateExpress(item) {
        const recargo = Math.round(item.precio * 0.2);
        const roundedRecargo = roundTotal(recargo, config);
        setCarrito(current => current.map(ci => ci.id === item.id ? { ...ci, express: true, precio: ci.precio + roundedRecargo, expressRecargo: roundedRecargo } : ci));
        setExpressItem(null);
      }

      React.useEffect(() => {
        saveLocal(STORAGE.carrito, carrito);
      }, [carrito]);

      React.useEffect(() => {
        if (step === 4 && pedidoConfirmado && carrito.length > 0) {
          setCarrito([]);
        }
      }, [step, pedidoConfirmado]);

      async function handlePagar() {
        setLoading(true);
        await new Promise(resolve => setTimeout(resolve, 1400));
        const order = buildOrder(carrito, form, slotSel, config, activeCareer);
        if (excedeCapacidad) {
          order.excede_capacidad = true;
          order.hojas_primera_entrega = dailyCap;
          order.hojas_segunda_entrega = totalHojas - dailyCap;
          order.segunda_entrega_fecha = getNextBusinessDay(order.fecha || new Date().toISOString().split('T')[0]);
          order.notas_admin = `Pedido grande. Parte 1: ${dailyCap} hojas el ${order.fecha}. Parte 2: ${order.hojas_segunda_entrega} hojas el ${order.segunda_entrega_fecha}.`;
        }
        order.wa_message = await generateWhatsAppMessageForOrder(order, config);
        setPedidos(previous => [order, ...previous]);
        setPedidoConfirmado(order);
        syncOrderToSheets(order, config);
        setLoading(false);
        setStep(4);
      }

      if (carrito.length === 0 && step !== 4) {
        return (
          <div className="fade-in">
            <div className="card p-8 text-center">
              <div className="text-xl font-800 text-ink-900 mb-2">Tu pedido esta vacio</div>
              <p className="text-sm text-ink-400 mb-4">Volvé al catalogo para sumar libros antes de pasar al pago.</p>
              <button className="btn-primary" onClick={onVolver}>Ir al catalogo</button>
            </div>
          </div>
        );
      }

      return (
        <div className="fade-in">
          {step !== 4 && (
            <button 
              onClick={() => {
                if (step > 1) {
                  setStep(step - 1);
                } else {
                  onVolver();
                }
              }} 
              className="flex items-center gap-2 text-sm text-ink-400 hover:text-ink-700 mb-5 font-700"
            >
              ← Volver
            </button>
          )}

          {step === 4 && pedidoConfirmado && (
            <div className="slide-up text-center">
              <div className="w-20 h-20 rounded-full bg-ok-muted flex items-center justify-center text-4xl mx-auto mb-5">✓</div>
              <h2 className="text-2xl font-800 text-ink-900 mb-2">Pedido confirmado</h2>
              <p className="text-ink-400 text-sm mb-5">ID {pedidoConfirmado.id} · {pedidoConfirmado.modalidad_entrega}</p>

              <div className="card p-5 mb-5">
                <div className="font-700 text-sm text-ink-800 mb-4">Seguimiento de tu pedido</div>
                <div className="timeline mb-4">
                  {['Pedido recibido', 'En preparacion', 'Listo!', 'Entregado'].map((label, idx) => {
                    const currentIndex = getStateIndexForConfirm(pedidoConfirmado.estado);
                    const isCompleted = idx < currentIndex;
                    const isCurrent = idx === currentIndex;
                    const isLast = idx === 3;
                    return (
                      <React.Fragment key={label}>
                        <div className="timeline-step">
                          <div className={`timeline-dot ${isCompleted ? 'completed' : isCurrent ? 'current' : 'pending'}`}>
                            {isCompleted ? <Icon.Check /> : idx + 1}
                          </div>
                          <div className={`timeline-label ${isCompleted ? 'completed' : isCurrent ? 'current' : 'pending'}`}>{label}</div>
                        </div>
                        {!isLast && <div className={`timeline-line ${isCompleted ? 'completed' : 'pending'}`} />}
                      </React.Fragment>
                    );
                  })}
                </div>
                <div className="text-xs text-ink-400">Estado actual: <strong className="text-ink-700">{pedidoConfirmado.estado}</strong></div>
              </div>

              <div className="card p-5 mb-6 text-left">
                <div className="font-700 text-sm text-ink-800 mb-4">Resumen de tu pedido</div>
                <div className="space-y-3">
                  <div className="flex justify-between text-sm"><span className="text-ink-500">Nombre</span><span className="font-700 text-right ml-4">{pedidoConfirmado.nombre}</span></div>
                  <div className="flex justify-between text-sm"><span className="text-ink-500">WhatsApp</span><span className="font-700">{pedidoConfirmado.whatsapp}</span></div>
                  <div className="border-t border-ink-100 pt-3">
                    <div className="text-xs font-700 text-ink-400 uppercase tracking-wide mb-2">Libros pedidos</div>
                    {pedidoConfirmado.items?.map((item, idx) => (
                      <div key={idx} className="flex justify-between text-sm mb-1">
                        <span className="text-ink-700">{item.titulo} <span className="text-ink-400">({item.formato} · {item.hojas} hojas{item.express ? ' · Express' : ''})</span></span>
                        <span className="font-700">{fmt(item.precio)}</span>
                      </div>
                    ))}
                  </div>
                  <div className="border-t border-ink-100 pt-3 space-y-2">
                    <div className="flex justify-between text-sm"><span className="text-ink-500">Total</span><span className="font-800 text-ink-900">{fmt(pedidoConfirmado.total)}</span></div>
                    <div className="flex justify-between text-sm"><span className="text-ink-500">Pagaste</span><span className="font-700 text-ok-DEFAULT">{fmt(pedidoConfirmado.monto_pagado)}</span></div>
                    {pedidoConfirmado.saldo_pendiente > 0 && (
                      <div className="flex justify-between text-sm bg-accent-muted/30 rounded-lg px-3 py-2 -mx-1">
                        <span className="font-700 text-accent">Saldo pendiente</span>
                        <span className="font-800 text-accent">{fmt(pedidoConfirmado.saldo_pendiente)}</span>
                      </div>
                    )}
                  </div>
                  <div className="border-t border-ink-100 pt-3 space-y-2">
                    {pedidoConfirmado.excede_capacidad ? (
                      <>
                        <div className="text-xs font-700 text-ink-400 uppercase tracking-wide mb-1">Entregas (pedido dividido)</div>
                        <div className="flex justify-between text-sm">
                          <span className="text-ink-500">Parte 1</span>
                          <span className="font-700 text-right ml-4">{pedidoConfirmado.ventana_retiro} <span className="text-ink-400">({pedidoConfirmado.hojas_primera_entrega} hojas)</span></span>
                        </div>
                        <div className="flex justify-between text-sm">
                          <span className="text-ink-500">Parte 2</span>
                          <span className="font-700 text-right ml-4">{new Date(`${pedidoConfirmado.segunda_entrega_fecha}T12:00:00`).toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' })} <span className="text-ink-400">({pedidoConfirmado.hojas_segunda_entrega} hojas)</span></span>
                        </div>
                      </>
                    ) : (
                      <div className="flex justify-between text-sm"><span className="text-ink-500">Entrega</span><span className="font-700 text-right ml-4">{pedidoConfirmado.ventana_retiro}</span></div>
                    )}
                    <div className="flex justify-between text-sm"><span className="text-ink-500">Lugar</span><span className="font-700 text-right ml-4">{pedidoConfirmado.lugar_entrega}</span></div>
                  </div>
                  <div className="border-t border-ink-100 pt-2">
                    <div className="flex justify-between text-xs"><span className="text-ink-400">Referencia</span><span className="font-700 text-ink-500">{pedidoConfirmado.talo_ref}</span></div>
                  </div>
                </div>
              </div>

              <button className="btn-primary w-full" onClick={onSuccess}>Volver al inicio</button>
            </div>
          )}

          {step !== 4 && (
            <>
              <div className="flex items-center gap-2 mb-6">
                {[['Datos', 1], [needsSlot ? 'Turno' : 'Entrega', 2], ['Pago', 3]].map(([label, index], position) => (
                  <React.Fragment key={label}>
                    <div className={`flex items-center gap-1.5 text-xs font-700 ${step >= index ? 'text-brand-DEFAULT' : 'text-ink-300'}`}>
                      <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-800 ${step >= index ? 'bg-brand-DEFAULT text-white' : 'bg-ink-100 text-ink-400'}`}>{step > index ? '✓' : index}</div>
                      {label}
                    </div>
                    {position < 2 && <div className={`flex-1 h-0.5 ${step > index ? 'bg-brand-DEFAULT' : 'bg-ink-100'}`} />}
                  </React.Fragment>
                ))}
              </div>

              <div className="card p-4 mb-5">
                <div className="text-xs font-700 text-ink-400 uppercase tracking-wide mb-3">Tu pedido</div>
                <div className="space-y-3">
                  {carrito.map(item => (
                    <div key={item.id} className={`grid grid-cols-[56px_1fr_auto] gap-3 items-center rounded-xl p-2 transition-all ${item.express ? 'bg-accent-muted/50 border border-accent/20' : ''}`}>
                      <Cover src={item.imagen_url} alt={item.titulo} />
                      <div className="min-w-0">
                        <div className="text-sm font-700 text-ink-900 truncate">{item.titulo}</div>
                        <div className="text-xs text-ink-400">{item.formato} · {item.hojas} hojas · {item.color ? 'Color' : 'B/N'} · {item.tipo === 'anillado' ? 'Anillado' : 'Abrochado'}{item.express ? ' · Express' : ''}</div>
                      </div>
                      <div className="flex flex-col items-end gap-1.5">
                        <span className={`font-700 text-sm ${item.express ? 'text-accent' : ''}`}>
                          {fmt(item.precio)}
                          {item.express && <span className="text-xs text-accent/70 ml-1">incl. express</span>}
                        </span>
                        <button
                          className="text-xs font-700 text-danger hover:underline"
                          onClick={() => setCarrito(current => current.filter(cartItem => cartItem.id !== item.id))}
                        >
                          Eliminar
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
                <div className="flex justify-between items-center pt-4 mt-4 border-t border-ink-100">
                  <span className="font-700">Total</span>
                  <span className="font-800 text-xl text-ink-900">{fmt(totalRounded)}</span>
                </div>
              </div>

              {expressItem && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={() => setExpressItem(null)}>
                  <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" />
                  <div className="relative card p-6 max-w-sm w-full slide-up" onClick={e => e.stopPropagation()}>
                    <div className="w-14 h-14 rounded-2xl bg-accent-muted flex items-center justify-center mx-auto mb-4 text-accent">
                      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>
                    </div>
                    <div className="text-center mb-4">
                      <div className="font-800 text-xl text-ink-900 mb-1">Salta la fila!</div>
                      <div className="text-sm text-ink-500 leading-relaxed">
                        Este libro entra en <strong className="text-ink-800">produccion inmediata</strong>. Nos salteamos la cola y nos ponemos a trabajar YA.
                      </div>
                    </div>
                    <div className="bg-ink-50 rounded-xl p-4 mb-4 space-y-2 text-sm">
                      <div className="flex justify-between"><span className="text-ink-500">Libro</span><span className="font-600 text-right ml-4 truncate max-w-[140px]">{expressItem.titulo}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Precio base</span><span className="font-600">{fmt(expressItem.precio)}</span></div>
                      <div className="flex justify-between"><span className="text-ink-500">Recargo express (20%)</span><span className="font-700 text-accent">+{fmt(roundTotal(Math.round(expressItem.precio * 0.2), config))}</span></div>
                      <div className="flex justify-between font-800 border-t border-ink-200 pt-2"><span>Nuevo precio</span><span>{fmt(expressItem.precio + roundTotal(Math.round(expressItem.precio * 0.2), config))}</span></div>
                    </div>
                    <div className="bg-accent-muted/40 rounded-xl p-3 mb-5 flex items-start gap-2.5">
                      <span className="text-accent text-sm flex-shrink-0 mt-0.5"><Icon.AlertCircle /></span>
                      <span className="text-xs text-accent/80 font-600">Al activar Express te contactamos al toque para coordinar la entrega prioritaria.</span>
                    </div>
                    <div className="flex gap-2">
                      <button className="btn-primary flex-1 bg-accent hover:bg-accent-light" onClick={() => activateExpress(expressItem)}>
                        <Icon.Zap /> Activar Express
                      </button>
                      <button className="btn-secondary" onClick={() => setExpressItem(null)}>Cancelar</button>
                    </div>
                  </div>
                </div>
              )}

              {step === 1 && (
                <div className="slide-up">
                  <div className="card p-5 mb-5 space-y-4">
                    <div>
                      <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">Nombre y apellido</label>
                      <input className="input-field" value={form.nombre} onChange={event => setForm(current => ({ ...current, nombre: event.target.value }))} placeholder="Ej: Camila Rojas" />
                    </div>
                    <div>
                      <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">WhatsApp</label>
                      <div className="flex">
                        <span className="border border-r-0 border-ink-200 bg-ink-50 rounded-l-xl px-3 flex items-center text-sm text-ink-500 font-700">+54 9</span>
                        <input className="input-field rounded-l-none" value={form.whatsapp} onChange={event => setForm(current => ({ ...current, whatsapp: event.target.value }))} placeholder="11 1234 5678" />
                      </div>
                    </div>
                    <div>
                      <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">Forma de confirmacion</label>
                      <div className="grid gap-3 sm:grid-cols-2">
                        {[['total', 'Pago total', totalRounded, 0], ['sena', 'Solo seña 50%', anticipo, saldo]].map(([value, label, payNow, pending]) => (
                          <button key={value} onClick={() => setForm(current => ({ ...current, pago: value }))} className={`radio-tile ${form.pago === value ? 'active' : ''}`}>
                            <div className="font-700 text-sm">{label}</div>
                            <div className="text-xs text-ink-400 mt-1">Pagas ahora {fmt(payNow)}{pending ? ` · saldo ${fmt(pending)}` : ''}</div>
                          </button>
                        ))}
                      </div>
                    </div>
                    <div>
                      <label className="text-xs font-700 text-ink-500 uppercase tracking-wide block mb-1.5">Modalidad de entrega</label>
                      <div className="grid gap-3 md:grid-cols-3">
                         {['Retiro domicilio', 'Retiro facultad', 'Cadete'].map(option => (
                          <button key={option} onClick={() => { 
                            setForm(current => ({ ...current, modalidad: option })); 
                            if (option !== 'Retiro facultad') {
                              const primerSlot = slots.find(s => s.disponible);
                              setSlotSel(primerSlot || null);
                            }
                          }} className={`radio-tile ${form.modalidad === option ? 'active' : ''}`}>
                            <div className="font-700 text-sm">{option}</div>
                            <div className="text-xs text-ink-400 mt-1">
                              {option === 'Cadete' ? `Se coordina por WhatsApp · a cargo del cliente` : option === 'Retiro domicilio' ? 'Chijra, coordinamos por WhatsApp' : deliveryPlaceFor(option, activeCareer, config)}
                            </div>
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                  <button className="btn-primary w-full text-base" disabled={form.nombre.trim().length < 3 || normalizePhone(form.whatsapp).length < 8} onClick={() => setStep(2)}>
                    {needsSlot ? 'Elegir ventana de retiro' : 'Ir al pago'}
                  </button>
                </div>
              )}

              {step === 2 && !needsSlot && (
                <div className="slide-up">
                  <div className="card p-5 mb-5">
                    <div className="text-xs font-700 text-ink-400 uppercase tracking-wide mb-4">Coordinacion por WhatsApp</div>
                    {slotSel && (
                      <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-4 mb-4">
                        <div className="flex items-center gap-2 mb-2">
                          <Icon.Check />
                          <span className="font-700 text-sm text-emerald-800">Se te asigno la entrega mas cercana disponible</span>
                        </div>
                        <div className="text-sm text-emerald-700">
                          Tu pedido estará listo el <strong>{fechaLabel(slotSel.fecha, slotSel.dOffset)}</strong> a las <strong>{slotSel.horario} hs. Si esta antes te avisaremos</strong>.
                        </div>
                      </div>
                    )}
                    <Alert type="info"><Icon.Message /><span>{form.modalidad === 'Cadete' ? `Cuando esté listo te contactamos por WhatsApp para coordinar el cadete. El costo corre por cuenta del alumno.` : `Cuando esté listo te contactamos por WhatsApp para coordinar la entrega en tu domicilio.`}</span></Alert>
                  </div>
                  <button className="btn-primary w-full text-base" onClick={() => setStep(3)}>Ir al pago</button>
                </div>
              )}

              {step === 2 && needsSlot && (
                <div className="slide-up">
                  <div className="card p-5 mb-5">
                    <div className="text-xs font-700 text-ink-400 uppercase tracking-wide mb-4">Ventanas disponibles</div>
                    <div className="space-y-3">
                      {slots.map(slot => (
                        <button key={`${slot.fecha}-${slot.turno}-${slot.horario}`} disabled={!slot.disponible} onClick={() => slot.disponible && setSlotSel(slot)} className={`turn-card w-full text-left ${slotSel?.fecha === slot.fecha && slotSel?.turno === slot.turno && slotSel?.horario === slot.horario ? 'selected' : ''} ${!slot.disponible ? 'disabled' : ''}`}>
                          <div className="flex items-center justify-between gap-3">
                            <div>
                              <div className="font-700 text-sm text-ink-800">{fechaLabel(slot.fecha, slot.dOffset)} · {slot.label}</div>
                              <div className="text-xs text-ink-500 mt-0.5">{slot.horario} · {deliveryPlaceFor(form.modalidad, activeCareer, config)}</div>
                            </div>
                            {!slot.disponible ? <span className="badge bg-red-50 text-red-600">{slot.bloqueado}</span> : slotSel?.fecha === slot.fecha && slotSel?.turno === slot.turno && slotSel?.horario === slot.horario ? <Icon.Check /> : <Icon.ChevronRight />}
                          </div>
                        </button>
                      ))}
                    </div>
                  </div>
                  <button className="btn-primary w-full text-base" disabled={!slotSel} onClick={() => setStep(3)}>Ir al pago</button>
                </div>
              )}

              {step === 3 && (
                <div className="slide-up">
                  <div className="talo-box mb-5">
                    <div className="flex items-center justify-between mb-4">
                      <span className="font-800 text-lg">Confirmacion por Talo</span>
                      <span className="inline-flex items-center gap-1.5 badge bg-[#22C55E]/20 text-[#4ADE80] text-xs px-3 py-1.5 border border-[#22C55E]/30">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 12 15 17 10"/></svg>
                        Pago Seguro
                      </span>
                    </div>
                    <div className="flex items-start gap-3 mb-4">
                      <div className="w-8 h-8 rounded-full bg-ok-DEFAULT/20 flex items-center justify-center flex-shrink-0 mt-0.5"><Icon.Zap /></div>
                      <div>
                        <div className="font-700 text-sm">Se valida automaticamente</div>
                        <div className="text-xs text-ink-300 mt-0.5">Si elegiste seña, el saldo pendiente queda informado para la entrega.</div>
                      </div>
                    </div>
                    <div className="bg-white/10 rounded-xl p-4 space-y-2">
                      <div className="flex justify-between text-sm"><span className="text-ink-300">Pagas ahora</span><span className="font-800">{fmt(form.pago === 'sena' ? anticipo : totalRounded)}</span></div>
                      <div className="flex justify-between text-sm"><span className="text-ink-300">Saldo pendiente</span><span className="font-800">{fmt(form.pago === 'sena' ? saldo : 0)}</span></div>
                    </div>
                  </div>

    function buildWhatsAppMessage(order) {
      if (order.wa_message) return order.wa_message;
      const readyStates = ['Listo', 'Entregado'];
      const intro = readyStates.includes(order.estado)
        ? `Hola ${order.nombre}, tus libros ya estan listos.`
        : `Hola ${order.nombre}, te compartimos el estado de tu pedido ${order.id}.`;
      const saldo = order.saldo_pendiente > 0 ? `Saldo pendiente: ${fmt(order.saldo_pendiente)}.` : 'No tenes saldo pendiente.';
      const entrega = (order.modalidad_entrega === 'Cadete' || order.modalidad_entrega === 'Retiro domicilio')
        ? 'Coordinamos por WhatsApp cuando este listo.'
        : `Te espero en ${order.lugar_entrega} a las ${order.horario_entrega}.`;
      return [
        intro,
        `Libros: ${order.libro}.`,
        `Estado: ${order.estado}.`,
        entrega,
        saldo
      ].join(' ');
    }

    function parseWhatsAppMessage(text, books, config) {
      const lower = slug(text);
      const matchedBooks = books.filter(book => lower.includes(slug(book.titulo)) || lower.includes(slug(book.materia)));
      const firstBook = matchedBooks[0] || books[0];
      const formatoMatch = text.match(/\b(A4|A5)\b/i);
      const phoneMatch = text.match(/(\+?54\s*9\s*)?(\d[\d\s-]{7,})/);
      const namedMatch = text.match(/nombre\s*:\s*(.+)/i);
      const firstTextLine = text.split('\n').map(line => line.trim()).find(line => /^[A-Za-zÁÉÍÓÚáéíóúÑñ ]{5,}$/.test(line));
      const senaMatch = text.match(/50\s*%|seña/i);
      const colorMatch = text.match(/\bcolor\b/i);
      const expressMatch = text.match(/urgente|express/i);
      const entregaMatch = text.match(/(\d{4}-\d{2}-\d{2})\s*(manana|tarde)?/i);
      const amountMatch = text.match(/\$\s*([\d\.]+)/);
      const formato = formatoMatch ? formatoMatch[1].toUpperCase() : (firstBook ? getBookFormats(firstBook)[0] : 'A4');
      const previewCalc = firstBook ? calcPrecioItem(firstBook, formato, 'basica', config, Boolean(colorMatch) && Number(firstBook.precio_color) > 0, Boolean(expressMatch)) : null;
      const total = matchedBooks.length > 0
        ? roundTotal(matchedBooks.reduce((acc, book) => acc + calcPrecioItem(book, formato, 'basica', config, Boolean(colorMatch) && Number(book.precio_color) > 0, Boolean(expressMatch)).total, 0), config)
        : (previewCalc ? previewCalc.total : 0);
      const montoPagado = amountMatch ? roundTotal(Number(amountMatch[1].replace(/\./g, '')), config) : senaMatch ? roundTotal(total * 0.5, config) : 0;
      return {
        nombre: (namedMatch?.[1] || firstTextLine || 'Alumno sin identificar').trim(),
        whatsapp: normalizePhone(phoneMatch?.[2] || ''),
        libros: matchedBooks.length ? matchedBooks : firstBook ? [firstBook] : [],
        formato,
        color: Boolean(colorMatch),
        express: Boolean(expressMatch),
        pago: montoPagado >= total && total > 0 ? 'total' : montoPagado > 0 ? 'sena' : 'pendiente',
        montoPagado,
        saldo: Math.max(0, total - montoPagado),
        total,
        entrega: entregaMatch ? { fecha: entregaMatch[1], turno: (entregaMatch[2] || 'tarde').toLowerCase() } : null
      };
    }

    function exportCsv(orders) {
      const headers = ['ID', 'Alumno', 'WhatsApp', 'Libro', 'Carrera', 'Formato', 'Hojas', 'Total', 'Pagado', 'Saldo', 'Estado', 'Entrega', 'Modalidad', 'Talo'];
      const rows = orders.map(order => [
        order.id,
        order.nombre,
        order.whatsapp,
        order.libro,
        order.carrera,
        order.formato,
        order.hojas,
        order.total,
        order.monto_pagado,
        order.saldo_pendiente,
        order.estado,
        order.ventana_retiro || order.fecha,
        order.modalidad_entrega,
        order.talo_ref
      ]);
      const csv = [headers, ...rows].map(row => row.map(value => `"${String(value ?? '').replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'pedidos-imprenta.csv';
      link.click();
    }

    function AdminLogin({ config, onSuccess }) {
      const [email, setEmail] = React.useState('');
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');
      const [loading, setLoading] = React.useState(false);

      async function submit() {
        if (!email.trim() || !password.trim()) {
          setError('Completá todos los campos.');
          return;
        }
        setLoading(true);
        setError('');
        try {
          const sb = window.supabase.createClient(config.supabase.url, config.supabase.anon_key);
          const { data, error: err } = await sb.auth.signInWithPassword({ email: email.trim(), password });
          if (err) {
            setError(err.message === 'Invalid login credentials' ? 'Email o contraseña incorrectos.' : err.message);
            setLoading(false);
            return;
          }
          const allowed = config.supabase.admin_email;
          const userEmail = data.user.email?.toLowerCase().trim();
          const allowedList = (allowed || '').split(',').map(e => e.toLowerCase().trim()).filter(Boolean);
          console.log('[AdminLogin] User:', userEmail, '| Allowed:', allowedList, '| Config loaded:', !!config.supabase.admin_email);
          if (allowedList.length > 0 && !allowedList.includes(userEmail)) {
            setError(`Este email no tiene permisos de administración.`);
            console.warn('[AdminLogin] Bloqueado. User:', userEmail, 'no está en la lista de admins.');
            await sb.auth.signOut();
            setLoading(false);
            return;
          }
          saveLocal(STORAGE.admin, { email: data.user.email, token: data.session.access_token });
          onSuccess(true);
        } catch (e) {
          setError(e.message || 'Error al conectar con Supabase.');
          setLoading(false);
        }

        <div className="fade-in max-w-md mx-auto pt-10">

        const prompt = `Hoy es ${fechaHoyStr}. Desglosa: "${mensaje}".

CATALOGO:
${booksContext}

REGLAS DE ORO:
1. FORMATO: A4 por defecto.
2. TRABAJO: Usa el nombre EXACTO del catalogo. Si no coincide exacto, usa el mas cercano.
3. VARIOS: Genera un objeto por cada libro.
4. FECHA: Calcula la fecha de entrega segun el dia mencionado. Formato YYYY-MM-DD. Si no hay dia especifico, deja vacio.
5. TELEFONO: Solo numeros, sin espacios ni guiones.
6. SENIA: Si hay una sena total, ponla solo en el primero, el resto 0. Si dice "pagado", la sena = precio.

Responde UNICAMENTE un Array JSON:
[{"alumno":"NOMBRE","formato":"A4/A5","libro":"NOMBRE_EXACTO","hojas":0,"paginas":0,"fecha":"YYYY-MM-DD","precio":0,"sena":0,"telefono":""}]`;

        const sheetsUrl = config.integraciones?.SHEETS_API_URL;

          setParserError('No esta configurada la URL del Apps Script en integraciones.SHEETS_API_URL');
          setParserLoading(false);
          return;

        try {
          const url = `${sheetsUrl.split('/exec')[0]}/exec?mode=parse&mensaje=${encodeURIComponent(prompt)}`;
          const response = await fetch(url, { method: 'GET' });
          if (!response.ok) throw new Error(`Error ${response.status}`);
          const data = await response.json();
          if (data.error) throw new Error(data.error);
          const pedidos = data.pedidos || [];

          const firstName = pedidos[0]?.alumno || 'Sin nombre';
          const matchedBooks = pedidos.map(p => {

          return {
            id: `${book.id}-${Date.now()}-${idx}`,
            libroId: book.id,
            titulo: book.titulo,
            materia: book.materia || aiPedido?.libro || '',
            carrera: book.carrera,
            id_carrera: bookCareerId(book),
            paginas: book.paginas || 0,
            hojas: pricing.hojas,
            formato: parserPreview.formato,
            encuadernacion: 'basica',
            color: useColor,
            express: parserPreview.express,
            precio: pricing.total,
            tipo: pricing.tipo,
            imagen_url: book.imagen_url
          };
        });
        const career = getCareer(config, books, items[0]?.id_carrera || '');
        const slot = {
          fecha: parserPreview.entrega?.fecha || today,
          turno: parserPreview.entrega?.turno || 'tarde',
          horario: parserPreview.entrega?.turno === 'manana' ? '10:00' : '19:00',
          label: parserPreview.entrega?.turno === 'manana' ? 'Mañana' : 'Tarde'
        };
        const total = roundTotal(items.reduce((acc, item) => acc + item.precio, 0), config);
        const order = {
          id: `WA${String(Date.now()).slice(-6)}`,
          nombre: parserPreview.nombre,
          whatsapp: parserPreview.whatsapp,
          items,
          libro: items.map(item => item.titulo).join(' + '),
          carrera: [...new Set(items.map(item => item.carrera))].join(' / '),
          id_carrera: career?.id_carrera || '',
          materia: [...new Set(items.map(item => item.materia))].join(' / '),
          formato: `${parserPreview.formato} ${parserPreview.color ? 'Color' : 'B/N'}${parserPreview.express ? ' Express' : ''}`,
          paginas: items.reduce((acc, item) => acc + item.paginas, 0),
          hojas: items.reduce((acc, item) => acc + item.hojas, 0),
          subtotal: total,
          total,
          monto_pagado: parserPreview.montoPagado,
          saldo_pendiente: Math.max(0, total - parserPreview.montoPagado),
          pago_modalidad: parserPreview.pago,
          estado: parserPreview.montoPagado > 0 ? 'Pendiente de impresión' : 'Pendiente de pago',
          fecha: slot.fecha,
          turno: slot.turno,
          modalidad_entrega: 'Retiro facultad',
          express: parserPreview.express,
          ventana_retiro: `${slot.fecha} · ${slot.horario}`,
          lugar_entrega: careerAddress(career, config),
          horario_entrega: slot.horario,
          talo_ref: `WA-${String(Date.now()).slice(-6)}`,
          ts: new Date().toISOString(),
          origen: 'whatsapp'
        };
        order.wa_message = parserPreview.aiMsjWs || await generateWhatsAppMessageForOrder(order, config);
        setOrders(previous => [order, ...previous]);
        syncOrderToSheets(order, config);
        } finally {
          setParserImporting(false);
        }
      }

      function setOrderState(orderId, estado) {
        setOrders(previous => previous.map(order => order.id === orderId ? { ...order, estado } : order));
      }

      function advanceOrderState(orderId, direction) {
        setOrders(previous => previous.map(order => {
          if (order.id !== orderId) return order;
          const idx = ORDER_STATES.indexOf(order.estado);
          const newIdx = direction === 'next' ? Math.min(ORDER_STATES.length - 1, idx + 1) : Math.max(0, idx - 1);
          return { ...order, estado: ORDER_STATES[newIdx] };
        }));
      }

      function deleteOrder(orderId) {
        if (confirm('¿Eliminar este pedido permanentemente?')) {
          setOrders(previous => previous.filter(order => order.id !== orderId));
          if (editingOrder === orderId) setEditingOrder(null);
        }
      }

      function getFirstName(fullName) {
        return fullName?.split(' ')[0] || 'amigo';
      }

      function goToOrders(filterUpdates = {}, excluded = []) {
        setFilters(current => ({ ...current, estado: 'all', ...filterUpdates }));
        setExcludedStates(excluded);
        setTab('pedidos');

      const todayOrders = orders.filter(order => order.fecha === today);
      const expressPending = orders.filter(order => order.express && order.estado !== 'Entregado');
      const todayHojas = todayOrders.reduce((acc, o) => acc + (o.hojas || 0), 0);

      const stateMeta = ORDER_STATES.map(state => {

        const colorMap = {
          'Pendiente de pago': 'bg-gray-200 text-gray-700 border-gray-300',

          'Para encuadernar': 'bg-orange-100 text-orange-700 border-orange-200',
          'Listo': 'bg-emerald-100 text-emerald-700 border-emerald-200',
          'Entregado': 'bg-gray-300 text-gray-600 border-gray-400'
        };
        return { state, count, color: colorMap[state] || 'bg-ink-100 text-ink-700 border-ink-200' };
      });

      const universities = [...new Set(config.carreras.map(c => c.universidad).filter(Boolean))];

      function addHoliday() {
        if (!newHoliday.fecha || !newHoliday.motivo) return;
        setConfig(current => ({
          ...current,

        setConfig(current => ({

            return { ...c, ventanas };

        }));

      return (
        <div className="fade-in">

            <div className="flex gap-2">
              <button className="btn-secondary" onClick={() => exportCsv(filtered)}><Icon.Download /> CSV</button>
              <button className="btn-secondary" onClick={() => exportExcel(filtered)}><Icon.Download /> Excel</button>

              </button>

          </div>

          {tab === 'dashboard' && (
            <div className="space-y-5">
              <div className="grid grid-cols-2 xl:grid-cols-4 gap-3">
                <button onClick={() => goToOrders({ estado: 'all' })} className="stat-card text-left hover:shadow-md transition-shadow">
                  <div className="text-2xl font-800 text-ink-900">{orders.length}</div>
                  <div className="text-xs text-ink-400 mt-0.5">Total pedidos</div>
                  <div className="text-[10px] text-ink-300 mt-1">Ver todos →</div>
                </button>
                <button onClick={() => goToOrders({ estado: 'all' }, ['Entregado'])} className="stat-card text-left hover:shadow-md transition-shadow">
                  <div className="text-2xl font-800 text-ink-900">{pendingCount}</div>
                  <div className="text-xs text-ink-400 mt-0.5">Pendientes</div>
                  <div className="text-[10px] text-ink-300 mt-1">No entregados →</div>
                </button>
                <button onClick={() => goToOrders({ estado: 'all' })} className="stat-card text-left hover:shadow-md transition-shadow">
                  <div className="text-2xl font-800 text-ink-900">{saldoCount}</div>
                  <div className="text-xs text-ink-400 mt-0.5">Con saldo</div>
                  <div className="text-[10px] text-ink-300 mt-1">Ver pedidos →</div>
                </button>
                <div className="stat-card">
                  <div className="text-2xl font-800 text-ink-900">{activePages.toLocaleString('es-AR')}</div>
                  <div className="text-xs text-ink-400 mt-0.5">Paginas hoy</div>
                  <div className="text-[10px] text-ink-300 mt-1">{todayOrders.length} pedidos · {todayHojas} hojas</div>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">

                  <div className="flex items-center justify-between mb-3">

                          <div className="text-xs text-ink-400 mt-1">{uniPending.length} activos · {uniOrders.filter(o => Number(o.saldo_pendiente) > 0).length} con saldo</div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}

          {tab === 'catalogo' && (
            <div className="space-y-5">
              {editingBook ? (
                <BookFormPanel
                  book={editingBook}
                  config={config}
                  careers={getCareers(config, books)}
                  onSave={(saved) => {
                    setBooks(prev => {
                      const idx = prev.findIndex(b => b.id === saved.id);
                      if (idx >= 0) { const next = [...prev]; next[idx] = saved; return next; }
                      return [...prev, saved];
                    });
                    setEditingBook(null);
                  }}
                  onCancel={() => setEditingBook(null)}
                />
              ) : (
                <>
                  <div className="flex items-center justify-between flex-wrap gap-3">
                    <div>
                      <div className="font-700 text-sm text-ink-800">Gestión del catálogo</div>
                      <div className="text-xs text-ink-400">{books.length} libros · {books.filter(b => b.activo !== false).length} activos</div>
                    </div>
                    <div className="flex gap-2 flex-wrap">
                      <button className="btn-primary text-xs px-3 py-2" onClick={() => {
                        const newBook = {
                          id: `lib-${String(Date.now()).slice(-6)}`, id_libro: `lib-${String(Date.now()).slice(-6)}`,
                          titulo: '', materia: '', id_carrera: config.carreras[0]?.id_carrera || '', carrera: config.carreras[0]?.nombre || '',
                          autor: '', paginas: 100, paginas_por_hoja: 2, pdf_url: '', activo: true,
                          a4_bn_habilitado: true, a4_bn_sugerido: 0, a4_bn_ajuste: 0, a4_bn_final: 0,
                          a4_color_habilitado: false, a4_color_final: 0,
                          a5_bn_habilitado: false, a5_bn_sugerido: 0, a5_bn_ajuste: 0, a5_bn_final: 0,
                          a5_color_habilitado: false, a5_color_final: 0,
                          imagen_url: 'https://placehold.co/420x520/E8ECF2/0D1117?text=Nuevo+Libro'
                        };
                        setEditingBook(recalcBookSugeridos(newBook, config));
                      }}><Icon.Book /> Nuevo libro</button>
                      <button className="btn-secondary text-xs px-3 py-2" onClick={() => {
                        const blob = new Blob([JSON.stringify(books, null, 2)], { type: 'application/json' });
                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'catalogo-export.json'; a.click();
                      }}><Icon.Download /> Exportar JSON</button>
                      <label className="btn-secondary text-xs px-3 py-2 cursor-pointer"><Icon.Upload /> Importar JSON
                        <input type="file" accept=".json" className="hidden" onChange={e => {
                          const f = e.target.files?.[0]; if (!f) return;
                          const reader = new FileReader();
                          reader.onload = ev => {
                            try {
                              const data = JSON.parse(ev.target.result);
                              if (!Array.isArray(data)) { alert('El archivo debe contener un array de libros.'); return; }
                              const migrated = data.map(b => migrateBook(b, config));
                              setBooks(migrated);
                            } catch { alert('Error al leer el archivo JSON.'); }
                          };
                          reader.readAsText(f);
                          e.target.value = '';
                        }} />

                      <button className="btn-ghost text-xs px-3 py-2" onClick={() => setCatFiltersVisible(v => !v)} title="Mostrar/ocultar filtros y columnas"><Icon.Filter /></button>
                    </div>
                  </div>

                  <div className="card p-4">
                    <div className="grid gap-3 sm:grid-cols-3">
                      <div className="relative">
                        <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-ink-400"><Icon.Search /></span>
                        <input className="input-field pl-10" placeholder="Buscar libro o materia" value={abmSearch} onChange={e => setAbmSearch(e.target.value)} />
                      </div>
                      <select className="input-field" value={abmCareer} onChange={e => setAbmCareer(e.target.value)}>
                        <option value="">Todas las carreras</option>
                        {getCareers(config, books).map(c => <option key={c.id_carrera} value={c.id_carrera}>{careerLabel(c)}</option>)}
                      </select>
                      <select className="input-field" value={abmStatus} onChange={e => setAbmStatus(e.target.value)}>

                    {catFiltersVisible && (
                      <div className="flex flex-wrap items-center gap-2 mt-3 pt-3 border-t border-ink-100">
                        <span className="text-xs text-ink-400">Columnas:</span>
                        {[
                          { key: 'libro', label: 'Libro' },
                          { key: 'carrera', label: 'Carrera' },
                          { key: 'paginas', label: 'Págs' },
                          { key: 'a4bn', label: 'A4 B/N' },
                          { key: 'a4color', label: 'A4 Color' },
                          { key: 'a5bn', label: 'A5 B/N' },
                          { key: 'a5color', label: 'A5 Color' },

                  </div>

                  <div className="table-shell">
                    <table>
                      <thead>
                        <tr>
                          {[
                            { key: 'libro', label: 'Libro' },
                            { key: 'carrera', label: 'Carrera' },
                            { key: 'paginas', label: 'Págs' },
                            { key: 'a4bn', label: 'A4 B/N' },
                            { key: 'a4color', label: 'A4 Color' },
                            { key: 'a5bn', label: 'A5 B/N' },
                            { key: 'a5color', label: 'A5 Color' },
                            { key: 'estado', label: 'Estado' },
                            { key: 'acciones', label: 'Acciones' }
                          ].map(col => (
                            <th key={col.key} style={!catColumnVisibility[col.key] ? { width: '40px', minWidth: '40px', maxWidth: '40px', overflow: 'hidden', padding: '8px' } : {}}>
                              {catColumnVisibility[col.key] ? (
                                <button className="flex items-center gap-1 w-full text-left hover:text-ink-900 transition-colors" onClick={() => handleCatSort(col.key)}>
                                  {col.label}
                                  {catSortConfig.key === col.key && (
                                    <span className="text-[10px]">{catSortConfig.direction === 'asc' ? '▲' : '▼'}</span>

                                <span className="text-xs opacity-50">{col.label.charAt(0)}</span>

                      </thead>

                        {(() => {
                          let list = books.filter(b => {
